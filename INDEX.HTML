<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Star Registry Record</title>

<style>
body {
  margin: 0;
  overflow-x: hidden;
  background: radial-gradient(circle, #0b0c2b, #000);
  color: white;
  font-family: Arial;
  text-align: center;
}

/* خلفية النجوم */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 10000px 5000px;}
}

/* مجرات */
.galaxy {
  position: fixed;
  width: 150px;
  opacity: 0.4;
  animation: spin 40s linear infinite;
}

.left-galaxy {
  left: 10px;
  top: 30%;
}

.right-galaxy {
  right: 10px;
  top: 60%;
}

@keyframes spin {
  from {transform: rotate(0deg);}
  to {transform: rotate(360deg);}
}

/* البطاقة */
.card {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 15px;
  display: inline-block;
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
  margin-top: 50px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

h1 {
  color: gold;
}

/* زر */
.star-btn {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, gold, orange);
  color: black;
  font-weight: bold;
  cursor: pointer;
  margin-top: 20px;
  box-shadow: 0 0 15px gold;
  transition: 0.3s;
}

.star-btn:hover {
  transform: scale(1.1);
}

/* iframe */
#starFrame {
  width: 90%;
  height: 500px;
  margin: 30px auto;
  border-radius: 15px;
  display: none;
  border: 2px solid gold;
}

.fade {
  opacity: 0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
  to {opacity: 1;}
}

input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}
</style>

<script>
function login() {
  var user = document.getElementById("user").value;
  var pass = document.getElementById("pass").value;

  if(user === "liza" && pass === "1234"){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("content").style.display = "block";
  } else {
    alert("Access Denied");
  }
}

function showStar() {
  document.getElementById("starFrame").style.display = "block";
}
</script>

</head>

<body>

<div class="stars"></div>

<!-- مجرات -->
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Spiral_Galaxy_M101.jpg" class="galaxy left-galaxy">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Spiral_Galaxy_M101.jpg" class="galaxy right-galaxy">

<div id="loginBox" class="fade">
  <h2>Star Registry Access</h2>
  <input type="text" id="user" placeholder="Username"><br><br>
  <input type="password" id="pass" placeholder="Password"><br><br>
  <button onclick="login()">Enter</button>
</div>

<div id="content" style="display:none;">
  <div class="card fade">
    <h1>Star Registry Record</h1>

    <p><strong>Star Name:</strong> Liza Star</p>
    <p><strong>Original Star:</strong> HD 140283</p>
    <p><strong>Constellation:</strong> Libra</p>

    <p><strong>Message:</strong> ❤️ في اليوم الذي رأيتك فيه عرفت انك النجم الذي سيضيء حياتي ❤️</p>

    <button class="star-btn" onclick="showStar()">
      🌠 View Your Star 🌠
    </button>
  </div>

  <iframe 
    id="starFrame"
    src="https://stellarium-web.org/skysource/HD%20140283">
  </iframe>

</div>

</body>
</html>
