<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Registry</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #0b0c2b, #000);
  color: white;
  font-family: Arial;
  text-align: center;
}

/* card */
.card {
  width: 90%;
  max-width: 400px;
  margin: 60px auto;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
}

/* inputs */
input {
  width: 80%;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

/* button */
button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: gold;
  cursor: pointer;
  font-size: 16px;
}

/* popup */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: black;
  z-index: 999;
}

#popup iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.close {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 25px;
  color: white;
  cursor: pointer;
}

/* stars click */
.star {
  position: fixed;
  color: gold;
  pointer-events: none;
  animation: fall 2s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(200px);
    opacity: 0;
  }
}
</style>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "liza" && p === "1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
  } else {
    alert("Wrong info");
  }
}

function openStar(){
  document.getElementById("popup").style.display="block";
}

function closeStar(){
  document.getElementById("popup").style.display="none";
}

/* ⭐ النجوم (مصححة للهاتف) */
document.addEventListener("click", function(e){

  // ❌ تجاهل كل العناصر التفاعلية
  if(
    e.target.tagName === "INPUT" ||
    e.target.tagName === "BUTTON" ||
    e.target.tagName === "IFRAME" ||
    e.target.closest("#login") ||
    e.target.closest("#popup")
  ){
    return;
  }

  let s = document.createElement("div");
  s.className = "star";
  s.innerHTML = "⭐";
  s.style.left = e.clientX + "px";
  s.style.top = e.clientY + "px";

  document.body.appendChild(s);

  setTimeout(()=>s.remove(),2000);
});
</script>

</head>

<body>

<!-- login -->
<div id="login" class="card">
  <h2>Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Enter</button>
</div>

<!-- main -->
<div id="main" style="display:none;">
  <div class="card">
    <h2>Liza Star ⭐</h2>
    <p>Original Star: HD 140283</p>
    <p>❤️ The day I saw you, I knew you were the star that would light up my life ❤️</p>

    <button onclick="openStar()">🌠 View Star</button>
  </div>
</div>

<!-- popup stellarium -->
<div id="popup">
  <span class="close" onclick="closeStar()">✖</span>
  <iframe src="https://stellarium-web.org/skysource/HD%20140283"></iframe>
</div>

</body>
</html>
