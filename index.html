<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Registry</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #0b0c2b, #000);
  color: white;
  font-family: Arial;
  text-align: center;
}

/* خلفية النجوم */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 10000px 5000px;}
}

/* البطاقة */
.card {
  width: 90%;
  max-width: 400px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

/* inputs */
input {
  width: 85%;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

/* زر */
button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, gold, orange);
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 10px gold;
}

/* popup */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: black;
  z-index: 999;
}

#popup iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "liza" && p === "1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
  } else {
    alert("Wrong username or password");
  }
}

function openStar(){
  document.getElementById("popup").style.display="block";
}
</script>

</head>

<body>

<div class="stars"></div>

<!-- login -->
<div id="login" class="card">
  <h2>Private Access</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Enter</button>
</div>

<!-- main -->
<div id="main" style="display:none;">
  <div class="card">
    <h2>Liza Star ⭐</h2>
    <p>Original Star: HD 140283</p>

    <p>
      ❤️ The day I saw you, I knew you were the star that would light up my life ❤️
    </p>

    <button onclick="openStar()">🌠 View Your Star</button>
  </div>
</div>

<!-- popup -->
<div id="popup">
  <iframe src="https://stellarium-web.org/skysource/HD%20140283"></iframe>
</div>

</body>
</html>
