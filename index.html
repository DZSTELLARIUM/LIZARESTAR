<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Registry</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #0b0c2b, #000);
  color: white;
  font-family: Arial;
  text-align: center;
  overflow-x: hidden;
}

/* stars */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 10000px 5000px;}
}

/* card */
.card {
  width: 90%;
  max-width: 400px;
  margin: 60px auto;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

/* inputs */
input {
  width: 80%;
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

/* button */
button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, gold, orange);
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px gold;
}

/* typing effect */
#message {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  margin-top: 15px;
}

/* iframe */
#starFrame {
  width: 95%;
  height: 300px;
  margin: 20px auto;
  display: none;
  border-radius: 10px;
  border: 2px solid gold;
}

/* floating stars click */
.star {
  position: fixed;
  color: gold;
  animation: fall 2s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(300px);
    opacity: 0;
  }
}
</style>

<script>
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "liza" && p === "1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
    startTyping();
    playMusic();
  } else {
    alert("Wrong info");
  }
}

/* typing */
let text = "The day I saw you, I knew you were the star that would light up my life ❤️";
let i = 0;

function startTyping() {
  let el = document.getElementById("message");
  let speed = setInterval(()=>{
    el.innerHTML += text.charAt(i);
    i++;
    if(i >= text.length) clearInterval(speed);
  },50);
}

/* show star */
function showStar(){
  document.getElementById("starFrame").style.display="block";
}

/* music */
function playMusic(){
  let audio = new Audio("https://www.bensound.com/bensound-music/bensound-love.mp3");
  audio.loop = true;
  audio.play();
}

/* click stars */
document.addEventListener("click", function(e){
  let s = document.createElement("div");
  s.className = "star";
  s.innerHTML = "⭐";
  s.style.left = e.clientX + "px";
  s.style.top = e.clientY + "px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),2000);
});
</script>

</head>

<body>

<div class="stars"></div>

<!-- login -->
<div id="login" class="card">
  <h2>Enter</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- main -->
<div id="main" style="display:none;">
  <div class="card">
    <h2>Liza Star ⭐</h2>
    <p>Original Star: HD 140283</p>
    <p id="message"></p>

    <button onclick="showStar()">🌠 View Star</button>
  </div>

  <iframe src="https://stellarium-web.org/skysource/HD%20140283" id="starFrame"></iframe>
</div>

</body>
</html>
