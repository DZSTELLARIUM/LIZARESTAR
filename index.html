<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Registry</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #0b0c2b, #000);
  color: white;
  font-family: Arial;
  text-align: center;
}

/* card */
.card {
  width: 90%;
  max-width: 400px;
  margin: 60px auto;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
}

/* inputs */
input {
  width: 80%;
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

/* button */
button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: gold;
  cursor: pointer;
}

/* popup */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.9);
}

#popup iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* close btn */
.close {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 20px;
  color: white;
  cursor: pointer;
}
</style>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "liza" && p === "1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
  } else {
    alert("Wrong info");
  }
}

function openStar(){
  document.getElementById("popup").style.display="block";
}

function closeStar(){
  document.getElementById("popup").style.display="none";
}
</script>

</head>

<body>

<!-- login -->
<div id="login" class="card">
  <h2>Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Enter</button>
</div>

<!-- main -->
<div id="main" style="display:none;">
  <div class="card">
    <h2>Liza Star ⭐</h2>
    <p>Original Star: HD 140283</p>
    <p>❤️ The day I saw you, I knew you were the star that would light up my life ❤️</p>

    <button onclick="openStar()">🌠 View Star</button>
  </div>
</div>

<!-- popup -->
<div id="popup">
  <span class="close" onclick="closeStar()">✖</span>

  <iframe src="https://stellarium-web.org/skysource/HD%20140283"></iframe>
</div>

</body>
</html>
