<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Star Gift</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #0b0c2b, #000);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* خلفية نجوم */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  animation: move 60s linear infinite;
}

@keyframes move {
  from {background-position: 0 0;}
  to {background-position: 10000px 5000px;}
}

/* card */
.card {
  width: 90%;
  max-width: 400px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* inputs */
input {
  width: 85%;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

/* button */
button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, gold, orange);
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px gold;
}

/* popup */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: black;
  z-index: 999;
}

#popup iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* typing */
#msg {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
}
</style>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "liza" && p === "1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
    startTyping();
    playMusic();
  } else {
    alert("Wrong info");
  }
}

/* typing effect */
let text = "The day I saw you, I knew you were the star that would light up my life ❤️";
let i = 0;

function startTyping(){
  let el = document.getElementById("msg");
  let speed = setInterval(()=>{
    el.innerHTML += text.charAt(i);
    i++;
    if(i >= text.length) clearInterval(speed);
  },50);
}

/* music */
function playMusic(){
  let audio = new Audio("https://www.bensound.com/bensound-music/bensound-love.mp3");
  audio.loop = true;
  audio.play().catch(()=>{});
}

/* فتح النجم */
function openStar(){
  document.getElementById("popup").style.display="block";
}
</script>

</head>

<body>

<div class="stars"></div>

<!-- login -->
<div id="login" class="card">
  <h2>Private Access</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Enter</button>
</div>

<!-- main -->
<div id="main" style="display:none;">
  <div class="card">
    <h2>Liza Star ⭐</h2>
    <p>Original Star: HD 140283</p>

    <p id="msg"></p>

    <button onclick="openStar()">🌠 View Your Star</button>
  </div>
</div>

<!-- popup بدون زر إغلاق -->
<div id="popup">
  <iframe src="https://stellarium-web.org/skysource/HD%20140283"></iframe>
</div>

</body>
</html>
